packages:
  - "apps/*"
  - "packages/*"

# Baileys depende de `libsignal` via git; o pnpm 11 bloqueia subdeps git por
# padrão. Liberamos para permitir a instalação.
blockExoticSubdeps: false

# Scripts de build (postinstall) permitidos. puppeteer=false → NÃO baixa o
# Chromium no install (usamos o binário da imagem Docker via PUPPETEER_*).
allowBuilds:
  "@nestjs/core": true
  # @scarf/scarf é telemetria (via @nestjs/swagger) — NÃO roda o postinstall.
  "@scarf/scarf": false
  baileys: true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  puppeteer: false
